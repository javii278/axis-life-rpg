services:
  - type: web
    name: axis-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: axis-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ANTHROPIC_API_KEY
        sync: false

  - type: web
    name: axis-frontend
    runtime: node
    rootDir: frontend
    buildCommand: npm ci && npm run build
    startCommand: node .next/standalone/server.js
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://axis-backend.onrender.com
      - key: NODE_ENV
        value: production

databases:
  - name: axis-db
    databaseName: axis
    user: axis
    plan: free
