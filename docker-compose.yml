services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: axis
      POSTGRES_USER: axis
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-axisdev}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U axis"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://axis:${POSTGRES_PASSWORD:-axisdev}@db:5432/axis
      SECRET_KEY: ${SECRET_KEY:-changeme-in-production}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
